<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Not Found</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f0f1a;
      color: #e0e0e0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      text-align: center;
      padding: 20px;
    }
    h1 {
      font-size: 72px;
      color: #f4811e;
      margin: 0;
      line-height: 1;
    }
    p {
      font-size: 18px;
      color: #888;
      margin-top: 16px;
    }
    a {
      color: #f4811e;
      text-decoration: none;
      margin-top: 24px;
      display: inline-block;
      padding: 12px 28px;
      border: 1px solid #f4811e;
      border-radius: 8px;
      transition: all 0.3s;
    }
    a:hover {
      background: #f4811e;
      color: #fff;
    }
  </style>
</head>
<body>
  <h1>404</h1>
  <p>The page you're looking for doesn't exist.</p>
  <a href="/">Go Home</a>
</body>
</html>
